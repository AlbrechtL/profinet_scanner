services:
  pn-scanner-virtual-tests:
    build:
      context: ../..
      dockerfile: test/docker/Dockerfile.lab
    image: pn-scanner-virtual-tests
    depends_on:
      pn-device-1:
        condition: service_started
      pn-device-2:
        condition: service_started
      pn-device-3:
        condition: service_started
    cap_add:
      - NET_RAW
      - NET_ADMIN
    working_dir: /workspace
    command:
      - -vv
      - --lab-profile=/workspace/test/profiles/virtual-profipp.json
    networks:
      profinet-virtual:
        ipv4_address: 172.28.0.10

  pn-device-1:
    build:
      context: ../..
      dockerfile: test/docker/Dockerfile.virtual-device
    image: pn-scanner-virtual-device
    mac_address: 02:42:ac:1c:00:0b
    environment:
      DEVICE_STATION_NAME: pn-device-1
      DEVICE_INTERFACE: eth0
      DEVICE_STORAGE_DIR: /var/lib/pn-device
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      profinet-virtual:
        ipv4_address: 172.28.0.11

  pn-device-2:
    image: pn-scanner-virtual-device
    depends_on:
      - pn-device-1
    mac_address: 02:42:ac:1c:00:0c
    environment:
      DEVICE_STATION_NAME: pn-device-2
      DEVICE_INTERFACE: eth0
      DEVICE_STORAGE_DIR: /var/lib/pn-device
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      profinet-virtual:
        ipv4_address: 172.28.0.12

  pn-device-3:
    image: pn-scanner-virtual-device
    depends_on:
      - pn-device-2
    mac_address: 02:42:ac:1c:00:0d
    environment:
      DEVICE_STATION_NAME: pn-device-3
      DEVICE_INTERFACE: eth0
      DEVICE_STORAGE_DIR: /var/lib/pn-device
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      profinet-virtual:
        ipv4_address: 172.28.0.13

networks:
  profinet-virtual:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24